name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test
      - name: Build
        run: swift build -c release
      - name: Package app bundle
        run: |
          # make-app.sh signs and launches; in CI just verify the bundle assembles.
          swift build -c release
          mkdir -p dist/BarKeep.app/Contents/MacOS
          cp .build/release/BarKeep dist/BarKeep.app/Contents/MacOS/
