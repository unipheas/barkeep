name: Feature request
description: Suggest a focused improvement to BarKeep
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe what you would like BarKeep to do.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Share any workarounds or different approaches you considered.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Menu-bar app
        - Busy Bar Arcade
        - CLI
        - MCP / AI integrations
        - Homebrew packaging
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I may be willing to implement this in a pull request.
